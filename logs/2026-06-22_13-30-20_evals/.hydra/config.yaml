eval:
  models:
  - model_name_or_path: ai4bharat/IndicBERTv2-MLM-only
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 128
    batch_size: 64
  - model_name_or_path: google/muril-base-cased
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 512
    context_mode: common_128
    batch_size: 96
  - model_name_or_path: google/muril-base-cased
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 512
    context_mode: model_max
    batch_size: 24
  - model_name_or_path: xlm-roberta-base
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 512
    context_mode: common_128
    batch_size: 64
  - model_name_or_path: xlm-roberta-base
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 512
    context_mode: model_max
    batch_size: 16
  - model_name_or_path: artifacts/model/modernbert/hf_export/phase1
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 1024
    context_mode: common_128
    batch_size: 256
  - model_name_or_path: artifacts/model/modernbert/hf_export/phase1
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 1024
    context_mode: model_max
    batch_size: 32
  - model_name_or_path: jhu-clsp/mmBERT-small
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 8192
    context_mode: common_128
    batch_size: 64
  - model_name_or_path: jhu-clsp/mmBERT-small
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 8192
    context_mode: model_max
    batch_size: 1
  output_dir: artifacts/evals
  seed: 17
  device: auto
  tasks:
  - ner
  - massive_intent
  supervised:
    do_train: true
    do_eval: true
    max_train_samples: null
    max_eval_samples: null
    num_train_epochs: 1.0
    learning_rate: 3.0e-05
    weight_decay: 0.01
    warmup_ratio: 0.1
    per_device_train_batch_size: 128
    per_device_eval_batch_size: 256
    max_seq_length: 128
    fp16: false
    bf16: true
    save_total_limit: 1
    report_to: []
  task_overrides:
    qa:
      max_seq_length: 384
      per_device_train_batch_size: 32
      per_device_eval_batch_size: 64
    copa:
      max_seq_length: 512
      per_device_train_batch_size: 16
      per_device_eval_batch_size: 32
  mlm:
    enabled: true
    data_root: data/eval/hi
    text_column: text
    max_seq_length: null
    mlm_probability: 0.15
    batch_size: 32
    max_shards: 1
    max_samples: null
    max_batches: null
    num_workers: 0
    seed: ${eval.seed}
  efficiency:
    enabled: true
    sequence_lengths: null
    batch_size: 32
    warmup_steps: 1
    measured_steps: 3
    use_mlm_head: false
    use_bf16_autocast: true
    measure_power: false
    sample_texts:
    - भारत में हिंदी भाषा अनेक रूपों में बोली और लिखी जाती है।
    - यह मूल्यांकन छोटे बैचों पर अनुमान गति और स्मृति उपयोग मापता है।
  reporting:
    write_json: true
    write_csv: true
    write_markdown: true
