# Hindi phase-1 evaluation suite.

hydra:
  job:
    chdir: false
  run:
    dir: logs/hi/evals/${now:%Y-%m-%d}_${now:%H-%M-%S}_phase1

eval:
  # Full model matrix for Hindi-only phase-1 checks. Per-model batch_size is used
  # by MLM holdout and efficiency; supervised fine-tuning uses eval.supervised
  # plus task_overrides below.
  #
  # Pre-flight checks verified 2026-06-22:
  # - This expands to 9 unique model/context output slugs.
  # - All unique model configs/tokenizers load with trust_remote_code=false.
  # - All tokenizers expose pad and mask tokens for MLM/data collators.
  # - Configured max_sequence_length values are within each model's advertised
  #   context limit: IndicBERTv2=128, MuRIL=512, XLM-R=512, phase1=1024,
  #   mmBERT-small=8192.
  # - The local phase1 HF export has model_type=modernbert and max_position_embeddings=1024.
  models:
    - model_name_or_path: ai4bharat/IndicBERTv2-MLM-only
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 128
      batch_size: 64
    - model_name_or_path: google/muril-base-cased
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 512
      context_mode: common_128
      batch_size: 96
    - model_name_or_path: google/muril-base-cased
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 512
      context_mode: model_max
      batch_size: 24
    - model_name_or_path: xlm-roberta-base
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 512
      context_mode: common_128
      batch_size: 64
    - model_name_or_path: xlm-roberta-base
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 512
      context_mode: model_max
      batch_size: 16
    - model_name_or_path: artifacts/model/modernbert/hi/hf_export/phase1
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 1024
      context_mode: common_128
      batch_size: 256
    - model_name_or_path: artifacts/model/modernbert/hi/hf_export/phase1
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 1024
      context_mode: model_max
      batch_size: 32
    - model_name_or_path: jhu-clsp/mmBERT-small
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 8192
      context_mode: common_128
      batch_size: 64
    - model_name_or_path: jhu-clsp/mmBERT-small
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 8192
      context_mode: model_max
      batch_size: 1

  output_dir: artifacts/evals/hi/phase1
  seed: 17
  device: auto

  tasks:
    # Hindi checkpoint gate:
    # - MLM holdout capped to one Hindi parquet shard.
    # - Naamapadam Hindi NER fine-tuning/eval.
    # - MASSIVE Hindi intent fine-tuning/eval.
    # - Efficiency sweep on fixed Hindi inputs.
    #
    # IndicXTREME transfer tasks live in hindi_transfer.yaml:
    # sentiment/QA/COPA fine-tune on English/source datasets, then evaluate on
    # Hindi target sets. Keep them separate so this checkpoint gate stays honest
    # for a Hindi-only phase-1 model.
    #
    # Current HF target split sizes:
    # - ner (Naamapadam hi): train=985787, validation=13460, test=867
    # - massive_intent (MASSIVE hi-IN): train=11514, validation=2033, test=2974
    - ner
    - massive_intent

  supervised:
    do_train: true
    do_eval: true

    # null means full available split; for this gate that is full Naamapadam train/eval.
    max_train_samples: null
    max_eval_samples: null
    num_train_epochs: 1.0
    learning_rate: 3.0e-5
    weight_decay: 0.01
    warmup_ratio: 0.1
    # Conservative full-matrix fine-tune batch. Higher values can be tried for a
    # single model, but 128 avoids waiting for late OOMs across the baselines.
    per_device_train_batch_size: 128
    per_device_eval_batch_size: 256
    # Gate supervised tasks (NER + MASSIVE intent) stay at 128 even on model_max runs.
    max_seq_length: 128
    fp16: false
    bf16: true
    save_total_limit: 1
    report_to: []

  task_overrides:
    qa:
      max_seq_length: 384
      # QA creates overflowed context features, so keep train batches lower than
      # sentence/token classification even though this phase1 gate does not run QA.
      per_device_train_batch_size: 32
      per_device_eval_batch_size: 64
    copa:
      max_seq_length: 512
      # Multiple-choice batches are effectively multiplied by the number of choices.
      per_device_train_batch_size: 16
      per_device_eval_batch_size: 32

  mlm:
    enabled: true
    data_root: data/eval/hi
    text_column: text
    # Verified locally: data/eval/hi contains parquet holdout shards. Keep
    # max_shards=1 below so the MLM holdout does not run over the full holdout set
    # for every model/context entry in this matrix.

    # null inherits the active model context: 128 for common_128, otherwise the
    # model's max_sequence_length (512/1024/8192 for model_max runs).
    max_seq_length: null
    mlm_probability: 0.15

    # Used only when a model entry omits batch_size; all configured models above
    # set an explicit value so long-context runs can stay conservative.
    batch_size: 32
    # One local holdout shard is enough for a phase-1 checkpoint gate.
    # load_eval_texts caps the sorted parquet list before reading rows.
    max_shards: 1
    max_samples: null
    max_batches: null
    num_workers: 0
    seed: ${eval.seed}

  efficiency:
    enabled: true

    # null inherits the active context: 128 for common_128, model max for model_max.
    sequence_lengths: null
    batch_size: 32
    warmup_steps: 1
    measured_steps: 3
    use_mlm_head: false
    use_bf16_autocast: true

    # Optional ModernBERT-style NVML power readings. Keep off unless pynvml/NVML is available.
    measure_power: false
    sample_texts:
      - भारत में हिंदी भाषा अनेक रूपों में बोली और लिखी जाती है।
      - यह मूल्यांकन छोटे बैचों पर अनुमान गति और स्मृति उपयोग मापता है।

  reporting:
    write_json: true
    write_csv: true
    write_markdown: true
