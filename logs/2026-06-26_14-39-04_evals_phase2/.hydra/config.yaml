eval:
  models:
  - model_name_or_path: artifacts/model/modernbert/hf_export/phase2_best_ba135
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 8192
  - model_name_or_path: artifacts/model/modernbert/hf_export/phase2_latest_ba1157
    tokenizer_name_or_path: null
    trust_remote_code: false
    max_sequence_length: 8192
  output_dir: artifacts/evals_phase2
  seed: 17
  device: auto
  tasks:
  - ner
  - massive_intent
  supervised:
    do_train: true
    do_eval: true
    max_train_samples: null
    max_eval_samples: null
    num_train_epochs: 1.0
    learning_rate: 3.0e-05
    weight_decay: 0.01
    warmup_ratio: 0.1
    per_device_train_batch_size: 128
    per_device_eval_batch_size: 256
    max_seq_length: 128
    fp16: false
    bf16: true
    save_total_limit: 1
    report_to: []
  task_overrides:
    qa:
      max_seq_length: 384
      per_device_train_batch_size: 32
      per_device_eval_batch_size: 64
    copa:
      max_seq_length: 512
      per_device_train_batch_size: 16
      per_device_eval_batch_size: 32
  mlm:
    enabled: false
  efficiency:
    enabled: false
  reporting:
    write_json: true
    write_csv: true
    write_markdown: true
