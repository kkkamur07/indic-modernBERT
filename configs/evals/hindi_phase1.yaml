# Hindi phase-1 evaluation suite.

hydra:
  job:
    chdir: false
  run:
    dir: logs/${now:%Y-%m-%d}_${now:%H-%M-%S}_evals

eval:
  # Each checkpoint below runs these contexts in order. model_max is skipped
  # automatically for checkpoints whose max_sequence_length is already 128.
  context_modes:
    - common_128
    - model_max

  models:
    - model_name_or_path: ai4bharat/IndicBERTv2-MLM-only
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 512
    - model_name_or_path: google/muril-base-cased
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 512
    - model_name_or_path: xlm-roberta-base
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 512
    - model_name_or_path: jhu-clsp/mmBERT-small
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 8192
    - model_name_or_path: artifacts/model/modernbert/hf_export/phase1
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 1024

  output_dir: artifacts/evals
  seed: 17
  device: auto

  tasks:
    - sentiment
    - ner
    - qa
    - copa

  supervised:
    do_train: true
    do_eval: true
    max_train_samples: null
    max_eval_samples: null
    num_train_epochs: 3.0
    learning_rate: 3.0e-5
    weight_decay: 0.01
    warmup_ratio: 0.1
    per_device_train_batch_size: 16
    per_device_eval_batch_size: 32
    max_seq_length: 128
    fp16: false
    bf16: true
    save_total_limit: 1
    report_to: []

  task_overrides:
    qa:
      max_seq_length: 384
      per_device_train_batch_size: 8
      per_device_eval_batch_size: 16
    copa:
      max_seq_length: 512
      per_device_train_batch_size: 8
      per_device_eval_batch_size: 16

  mlm:
    enabled: true
    data_root: data/eval/hi
    text_column: text
    # null inherits the active model context; set a smaller integer to force a cap.
    max_seq_length: null
    mlm_probability: 0.15
    # Keep this feasible for the 8192-token model_max MLM pass.
    batch_size: 1
    # null consumes the whole local holdout shard listed in data/eval/hi/holdout_manifest.txt.
    max_samples: null
    max_batches: null
    num_workers: 0
    seed: ${eval.seed}

  efficiency:
    enabled: true
    # null inherits the active context: 128 for common_128, model max for model_max.
    sequence_lengths: null
    batch_size: 1
    warmup_steps: 2
    measured_steps: 5
    use_mlm_head: false
    use_bf16_autocast: true
    # Optional ModernBERT-style NVML power readings. Keep off unless pynvml/NVML is available.
    measure_power: false
    sample_texts:
      - भारत में हिंदी भाषा अनेक रूपों में बोली और लिखी जाती है।
      - यह मूल्यांकन छोटे बैचों पर अनुमान गति और स्मृति उपयोग मापता है।

  reporting:
    write_json: true
    write_csv: true
    write_markdown: true
