# Hindi DPR retrieval fine-tuning — mirrors upstream ModernBERT's recipe.
#
# Upstream recipe (Appendix E.2):
#   - Train on MS-MARCO with mined hard negatives, 1.25M samples, 1 epoch
#   - CachedMultipleNegativesRankingLoss (contrastive)
#   - Select best model by avg nDCG@10 on {NFCorpus, SciFact, TREC-Covid, FiQA}
#   - batch_size=64, grad_accum=8 (base, 8 GPUs) → effective 4096
#   - warmup_ratio=0.05, bf16, NO_DUPLICATES sampler
#
# This repo's adaptation (fully Hindi):
#   - Train on Hindi-translated MS-MARCO triples (unicamp-dl/mmarco, "hindi"),
#     the same recipe but in Hindi instead of English
#   - Same loss/selection methodology as the paper, but selection ranks a carved
#     subset of a Hindi benchmark (mmarco_hindi) by nDCG@10 instead of English BEIR
#   - Single RTX 4090: batch_size=64, grad_accum=8 → effective 512
#   - Explore LR with Hydra Optuna; objective is Hindi nDCG@10
#
# Usage:
#   # Single LR run:
#   make retrieval-finetune ARGS="retrieval_ft.learning_rate=8e-5"
#
#   # Optuna LR exploration:
#   make retrieval-optuna
#
#   # Then evaluate the best trial checkpoint:
#   make run-evals-retrieval ARGS="eval.models.0.model_name_or_path=<best-trial-final_model_path>"

hydra:
  job:
    chdir: false
  run:
    dir: logs/${now:%Y-%m-%d}_${now:%H-%M-%S}_retrieval_finetune

retrieval_ft:
  # --- Backbone ---
  # Override per-checkpoint: retrieval_ft.backbone=<path>
  backbone: artifacts/model/modernbert/hf_export/phase2_latest_ba1157
  trust_remote_code: false
  max_seq_length: 8192

  # --- Training data ---
  # Hindi-translated MS-MARCO triples (query, positive, negative) — the Hindi
  # analog of upstream's English MS-MARCO. Same triplet schema, so the loss and
  # in-training dev evaluator both operate on Hindi text. The eval-time
  # mmarco_hindi (BEIR-style corpus/queries/qrels) is separate and not used here.
  train_dataset: unicamp-dl/mmarco
  train_dataset_config: hindi
  train_dataset_split: train
  # mMARCO is a loading-script dataset, so it must be trusted at load time.
  train_trust_remote_code: true
  # Stream only the capped sample budget instead of building the full 39.8M-row
  # Arrow cache. This is especially important for Optuna, which only needs
  # max_train_samples + eval_split_size rows per trial.
  train_streaming: true
  train_shuffle_buffer: 100000
  # Hindi mMARCO train has ~39.8M triples; cap to match upstream's 1.25M budget.
  max_train_samples: 1_250_000

  # --- Loss ---
  loss: CachedMultipleNegativesRankingLoss
  # mini_batch_size for GradCache; increase if VRAM allows.
  mini_batch_size: 16

  # --- Training hyperparameters ---
  num_train_epochs: 1
  # per_device batch sizes — effective batch = batch * grad_accum * n_gpu
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 64
  gradient_accumulation_steps: 8
  learning_rate: 8e-5
  warmup_ratio: 0.05
  bf16: true
  fp16: false
  batch_sampler: NO_DUPLICATES

  # --- Checkpointing ---
  save_strategy: steps
  save_steps: 500
  save_total_limit: 2
  logging_steps: 100

  # --- Evaluation during training ---
  eval_strategy: steps
  eval_steps: 500
  # Quick in-training eval on a small held-out set from the training data.
  eval_split_size: 1000
  # Stop trials whose Hindi triplet dev accuracy stops improving. This is
  # separate from model selection, which uses Hindi nDCG@10 (see below).
  load_best_model_at_end: true
  metric_for_best_model: eval_train-dev_cosine_accuracy
  greater_is_better: true
  early_stopping_patience: 2
  early_stopping_threshold: 0.0

  # --- Model selection (Hindi) ---
  # LR/model selection ranks a carved subset of a Hindi MS-MARCO-style benchmark
  # by nDCG@10 — the Optuna objective. This keeps selection Hindi while matching
  # upstream's short-passage DPR setup. MLDR is intentionally reserved for final
  # long-context evaluation; the model's 8192 ability should come from
  # pretraining, not from changing the upstream retrieval fine-tune recipe.
  selection_dataset_name: AIhnIndicRag/mmarco_hindi
  selection_kind: hf_beir
  selection_trust_remote_code: false
  selection_corpus_config: corpus
  selection_corpus_split: corpus
  selection_queries_config: queries
  selection_queries_split: queries
  selection_qrels_config: default
  selection_qrels_split: test
  # Carved subset for selection. 50k docs keeps per-trial scoring practical,
  # while 500 queries is enough for a stable relative LR signal. nDCG is higher
  # on a smaller corpus, so treat this as a selection signal, not the final
  # reported score.
  selection_max_corpus_docs: 50000
  selection_max_queries: 500
  selection_top_k: 10
  selection_batch_size: 32
  selection_corpus_chunk_size: 50000

  # --- Output ---
  output_dir: artifacts/retrieval_finetune
  seed: 17

  # --- Post-tuning full evaluation ---
  # After selecting the best LR, run the full Hindi retrieval eval suite.
  eval_config: hindi_retrieval
