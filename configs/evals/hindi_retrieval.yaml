# Hindi retrieval benchmark.
#
# Upstream ModernBERT does not report retrieval from raw MLM checkpoints. It
# fine-tunes every backbone with the same retrieval recipe, selects/tunes by
# BEIR nDCG@10, then reports nDCG@10. Use this config with retrieval-fine-tuned
# SentenceTransformers-compatible checkpoints for fair numbers.
#
# === Workflow (mirrors upstream Appendix E.2) ===
#
# Step 1 — Optuna LR exploration + fine-tune:
#   make retrieval-optuna ARGS="retrieval_ft.backbone=<hf-export-path>"
#   This samples 10 LRs from 1e-6..1e-2 and maximizes BEIR avg nDCG@10.
#
# Step 2 — Evaluate the best retriever on Hindi benchmarks:
#   make run-evals-retrieval ARGS="eval.models.0.model_name_or_path=<best-trial-final_model_path>"
#
# Smoke example on a raw export (not a fair retrieval score):
#   make run-evals-retrieval ARGS="eval.models.0.model_name_or_path=artifacts/model/modernbert/hf_export/phase2_latest_ba1157 eval.retrieval.datasets.1.max_corpus_docs=100000 eval.retrieval.datasets.1.max_queries=200 eval.retrieval.batch_size=2"

hydra:
  job:
    chdir: false
  run:
    dir: logs/${now:%Y-%m-%d}_${now:%H-%M-%S}_evals_retrieval

eval:
  # Keep retrieval comparison focused on the selected ba1157 checkpoint and the
  # two long/Indic baselines we care about for interpretation.
  models:
    - model_name_or_path: artifacts/model/modernbert/hf_export/phase2_latest_ba1157
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 8192
      context_mode: model_max
    - model_name_or_path: ai4bharat/IndicBERTv2-MLM-only
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 128
      context_mode: common_128
    - model_name_or_path: jhu-clsp/mmBERT-small
      tokenizer_name_or_path: null
      trust_remote_code: false
      max_sequence_length: 8192
      context_mode: model_max

  output_dir: artifacts/evals_retrieval
  seed: 17
  device: auto

  # Retrieval runs should be separate from MLM/supervised/efficiency gates.
  tasks: []

  mlm:
    enabled: false

  efficiency:
    enabled: false

  retrieval:
    enabled: true
    # null inherits active context length: 8192 for the model_max export above.
    max_seq_length: null
    # Single batch size for encoding (queries + corpus). Keep conservative for
    # 8192-token MLDR docs; raise via eval.retrieval.batch_size after VRAM smoke.
    batch_size: 2
    # Matches sentence-transformers InformationRetrievalEvaluator default.
    corpus_chunk_size: 50000
    top_k: 10
    datasets:
      # Long-context retrieval capacity, aligned with ModernBERT paper's MLDR
      # long-document evaluation framing. Hindi MLDR docs average ~5.5k words.
      - name: mldr_hi
        enabled: true
        kind: mldr
        dataset_name: Shitao/MLDR
        trust_remote_code: true
        language: hi
        corpus_split: corpus
        qrels_split: test
        max_corpus_docs: null
        max_queries: null

      # Hindi MS-MARCO-style retrieval quality. This is large (~5.7M corpus
      # rows), so use max_corpus_docs/max_queries overrides for smoke runs.
      # Full exact scoring is expensive but preserves the benchmark definition.
      - name: mmarco_hindi
        enabled: true
        kind: hf_beir
        dataset_name: AIhnIndicRag/mmarco_hindi
        trust_remote_code: false
        corpus_config: corpus
        corpus_split: corpus
        queries_config: queries
        queries_split: queries
        qrels_config: default
        qrels_split: test
        max_corpus_docs: null
        max_queries: null

  reporting:
    write_json: true
    write_csv: true
    write_markdown: true
