hydra:
  job:
    chdir: false
  run:
    dir: logs/${now:%Y-%m-%d}_${now:%H-%M-%S}_${hydra.job.name}

tokenizer:
  pretokenization:
    use_script_norm: true
    use_nfkc: true
    stage: subword  # subword | superword

  trainer:
    # Sangrah verified/hin: 18 random training shards (see dataset/sangrah_dataset.py).
    # Standalone BPE omitted — SuperBPE stage 1 trains subword BPE. Use `make train-bpe`
    # only if you add a `bpe:` block back for pure-BPE ablations.
    superbpe:
      data_root: data/sangrah_dataset
      output_dir: artifacts/tokenizer/superbpe
      text_column: text
      vocab_sizes: [32768,50368,65536,98304,131072,196608]
      transition_fraction: 0.9 # MUTANT uses ~90% of |V| for stage-1 subword learning (Table 13).
      min_frequency: 2

  evals:
    # Holdout: 2 Hindi parquets under data/eval/hi/verified/hin/ (held out from training).
    # Per-vocab outputs: artifacts/tokenizer/superbpe_vs{V}/tokenizer.json
    intrinsic:
      tokenizer_path: artifacts/tokenizer/superbpe_vs32768/tokenizer.json
      data_root: data/eval/hi
      text_column: text
      baseline_tokenizer_names:
        - ai4bharat/IndicBERTv2-MLM-only
        - sarvamai/sarvam-1
      # NSL reference: tokenize the same Hindi eval text with this model.
      reference_tokenizer_name: ai4bharat/IndicBERTv2-MLM-only
      renyi_alpha: 2.5
      # parallel_data_path: data/eval/flores_hi_en.parquet
      parallel_hindi_column: text_hi
      parallel_reference_column: text_eng

    parity:
      tokenizer_path: artifacts/tokenizer/superbpe_vs32768/tokenizer.json
      data_root: data/eval/hi
      text_column: text
      baseline_tokenizer_names:
        - ai4bharat/IndicBERTv2-MLM-only
        - sarvamai/sarvam-1
      reference_tokenizer_name: ai4bharat/IndicBERTv2-MLM-only
      parallel_data_path: data/eval/flores_hi_en.parquet
      parallel_hindi_column: text_hi
      parallel_reference_column: text_eng
