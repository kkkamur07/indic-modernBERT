# Optuna LR sweep on the same stack as phase-1 pretrain:
# modernbert_base (22L), FA2, torch.compile, fa_cross_entropy, packed unpadded,
# global_batch=512, micro=8, 500M packer warmup, WSD scheduler — only duration,
# artifact paths, and optimizer.lr differ.
#
# Run: uv sync --extra pretrain --extra sweep && make lr-sweep
defaults:
  - hindi_mlm_phase1
  - override hydra/sweeper: optuna
  - _self_

hydra:
  searchpath:
    - file:///${oc.env:PWD}/configs/hi/pretrain
  run:
    dir: logs/hi/pretrain/lr_sweep/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    subdir: ${hydra.job.num}
  sweeper:
    sampler:
      _target_: optuna.samplers.TPESampler
    direction: minimize
    study_name: hindi_mlm_lr
    n_trials: 8
    n_jobs: 1
    params:
      pretrain.optimizer.lr: tag(log, interval(1e-6, 1e-2))

pretrain:
  output_dir: artifacts/model/modernbert/hi/lr_sweep
  save_folder: artifacts/model/modernbert/hi/checkpoints/lr_sweep
  # Short batch-scoped LR probe (~524M tokens @ global 512 when counted); WSD uses batch time units.
  max_duration: 1000ba
  scheduler:
    name: warmup_stable_decay
    t_warmup: 0ba
    alpha_f: 0.0
    t_decay: 0ba
  eval_interval: 100ba
  save_interval: 1000ba
  save_num_checkpoints_to_keep: 0
  save_overwrite: true
  autoresume: false
  progress_bar: false
  log_to_console: false

  # Compact shard index + row-group reads (see ParquetMLMDataset).
  num_workers: 2
  eval_num_workers: 3
  packing_prefetch_factor: 5
  dataloader_prefetch_factor: 4
  # Workers persist across epochs within a trial (perf); the explicit teardown in
  # _release_training_resources reaps them between Optuna trials so they don't
  # accumulate to OOM across the in-process multirun.
  dataloader_persistent_workers: true

  loggers:
    tensorboard:
      log_dir: artifacts/model/modernbert/hi/tensorboard/lr_sweep
  callbacks:
    train_step_logger:
      enabled: false
    save_best_checkpoints:
      num_checkpoints: 1
