# Fast smoke model: same attention path as full pretrain (RoPE, unpadded, FA2,
# sliding window + global every 3 layers). Only shrink width/depth for speed.
extends: modernbert_base.yaml
model_config:
  vocab_size: 4096
  num_hidden_layers: 4
  hidden_size: 384
  intermediate_size: 576
  num_attention_heads: 6
  loss_function: cross_entropy
  compile_model: false
