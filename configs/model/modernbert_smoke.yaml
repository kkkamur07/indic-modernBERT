# Tiny ModernBERT config for CPU/GPU smoke tests (no flash-attn required).
model_config:
  vocab_size: 4096
  num_hidden_layers: 2
  hidden_size: 256
  intermediate_size: 384
  num_attention_heads: 4
  attention_layer: base
  attention_probs_dropout_prob: 0.0
  attn_out_bias: false
  attn_out_dropout_prob: 0.0
  attn_qkv_bias: false
  bert_layer: prenorm
  embed_dropout_prob: 0.0
  embed_norm: true
  final_norm: true
  skip_first_prenorm: true
  embedding_layer: sans_pos
  loss_function: cross_entropy
  loss_kwargs:
    reduction: mean
  mlp_dropout_prob: 0.0
  mlp_in_bias: false
  mlp_layer: glu
  mlp_out_bias: false
  normalization: layernorm
  norm_kwargs:
    eps: 0.00001
    bias: false
  hidden_act: gelu
  head_pred_act: gelu
  activation_function: gelu
  padding: padded
  rotary_emb_dim: null
  rotary_emb_base: 10000.0
  rotary_emb_interleaved: false
  compile_model: false
  masked_prediction: true
  sliding_window: -1
  global_attn_every_n_layers: -1
  unpad_embeddings: false
  pad_logits: false
  use_fa2: false
